# ---------------------------------------------------------------------------
# Discovery node (discover_channels)
# ---------------------------------------------------------------------------
discovery:
  seed_channel_score_threshold: 50   # min composite_score to qualify as a seed channel
  related_max_videos: 3              # videos sampled per seed for related traversal
  related_max_results: 10            # max related channels fetched per video
  # Quota cost constants (informational — used in log messages and quota accounting)
  quota_cost_video_search: 100       # units per search.list call (Part A)
  quota_cost_related_traversal: 302  # units per seed channel (Part B): ~1+1+100×3

# ---------------------------------------------------------------------------
# YouTube API client (youtube_client)
# ---------------------------------------------------------------------------
youtube:
  retryable_status_codes:
    - 429
    - 500
    - 502
    - 503
    - 504
  max_retries: 5
  initial_backoff_seconds: 1.0
  max_backoff_seconds: 60.0
