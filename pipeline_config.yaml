# Pipeline behavior configuration
# Controls scoring thresholds, keyword lists, filters, discovery, and YouTube retry logic
# Secrets and API keys go in .env, not here

# ---------------------------------------------------------------------------
# LLM score filter (llm_score_influencers node)
# ---------------------------------------------------------------------------
llm_scoring:
  score_floor: 4   # channels scoring below this are dropped from the pipeline

# ---------------------------------------------------------------------------
# Deterministic scoring (score_influencers node)
# ---------------------------------------------------------------------------
scoring:
  cache_days: 30               # reuse cached score if scored within this many days
  metrics_change_threshold: 0.10  # re-score if engagement or audience tier changed >10%
  min_subscribers: 1000        # hard floor — channels below this score 0

  # Scoring component max points (must sum to 100)
  weights:
    engagement_max: 35         # log-scale of engagement rate
    audience_size_max: 15      # tiered by subscriber count
    keyword_relevance_max: 25  # scaled from keyword_scorer (0–30 → 0–25)
    tutorial_signal_max: 15    # how-to / tutorial video title matches
    upload_recency_max: 10     # upload cadence

  # Audience size tiers (pts awarded when subscriber_count < upper bound)
  # Listed in ascending order; last entry is the fallback for 500k+
  audience_size_tiers:
    - max_subscribers: 1000
      pts: 0
    - max_subscribers: 5000
      pts: 3
    - max_subscribers: 10000
      pts: 10
    - max_subscribers: 50000
      pts: 15    # sweet spot
    - max_subscribers: 200000
      pts: 12
    - max_subscribers: 500000
      pts: 7
    - max_subscribers: null    # 500k+ fallback
      pts: 3

  # Upload recency tiers (pts awarded when upload_frequency_days <= threshold)
  upload_recency_tiers:
    - max_days: 7
      pts: 10
    - max_days: 14
      pts: 7
    - max_days: 30
      pts: 3
    - max_days: null   # >30 days fallback
      pts: 0

  # Tutorial signal matching — checked against recent_video_titles (lowercase)
  # Each match adds tutorial_pts_per_match pts, capped at tutorial_signal_max
  tutorial_pts_per_match: 5
  tutorial_signals:
    - how to
    - tutorial
    - step by step
    - guide
    - setup
    - set up
    - course
    - beginner
    - learn
    - walkthrough
    - explained
    - for beginners
    - masterclass
    - training
    - getting started

# ---------------------------------------------------------------------------
# Keyword relevance scoring (keyword_scorer)
# Raw points scale: 0 → ~50 (all high-value matched), normalized to 0–30
# ---------------------------------------------------------------------------
keyword_scoring:
  max_raw_pts: 50      # theoretical max raw keyword score (used for normalization)
  max_scaled_pts: 30   # output range after normalization

  # Rationale fit thresholds (raw keyword_pts)
  fit_thresholds:
    strong: 6
    good: 4
    moderate: 2
    # below moderate → weak fit

  # Max niche tags to return per channel
  max_niche_tags: 5

  # Negative keywords — any match immediately disqualifies the channel (score = 0)
